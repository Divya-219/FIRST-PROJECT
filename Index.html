<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
  }
 main {
    max-width: 400px;
    margin: 50px auto; 
    padding: 20px;
    border: 1px solid #ccc;
    border-radius: 10px;
  }
    


</style>


</head>
<body>
  <header>
        <h1>Hello World, My name is Divya Patel</h1>
        <h2>Welcome to my website</h2>
    </header>
     <main>
        <img src="images/FemalePlaceholder.png"
             alt="Female placeholder image" 
             style="width:100px;height:100px;">

        <section>
            <h2>Contact Me!!</h2>

            <form class="form" id="form" method="post" action="#">
                
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" placeholder="Enter your name..."required><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" placeholder="Enter your email..." required><br><br>

                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="5" placeholder="Enter your message..." required></textarea><br><br>

               <button style="background-color:#007BFF; color: #000; width: fit-content; padding: 10px 20px; border-radius: 5px; cursor: pointer; "  type="submit" >Submit</button>
           
            </form>

        </section>

    </main>

</body>
</html>
